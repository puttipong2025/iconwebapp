<script>
let currentUser = JSON.parse(localStorage.getItem('session'));

// เปลี่ยนฟังก์ชัน Login
async function doLogin() {
    const p = $('#phone').val();
    showLoading('กำลังตรวจสอบสิทธิ์...');

    try {
        const response = await fetch('/.netlify/functions/api?action=login', {
            method: 'POST',
            body: JSON.stringify({ phone: p })
        });
        const res = await response.json();
        
        if (response.ok) {
            currentUser = res;
            localStorage.setItem('session', JSON.stringify(res));
            showUI();
        } else {
            Swal.fire("ผิดพลาด", res.message, "error");
        }
    } catch (e) {
        Swal.fire("Error", "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้", "error");
    } finally {
        closeLoading();
    }
}

// เปลี่ยนฟังก์ชันโหลดตาราง
async function loadWorkTable() {
    try {
        const response = await fetch('/.netlify/functions/api?action=getData', {
            method: 'POST',
            body: JSON.stringify({ userId: currentUser.id, role: currentUser.role })
        });
        const data = await response.json();
        renderDataTable(data); // ใช้ฟังก์ชันวาดตารางเดิมของคุณได้เลย
    } catch (e) {
        console.error("Load table error", e);
    }
}
</script>
